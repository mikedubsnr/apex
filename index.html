<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ApexVisa — Elite UI</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#070a16;
  --card:#0f1424;
  --border:rgba(255,255,255,0.08);
  --blue:#4f8ef7;
  --text:#e8eaf0;
  --text2:#9aa3b8;
}

body{
  margin:0;
  font-family:'Plus Jakarta Sans',sans-serif;
  background:#070a16;
  color:var(--text);
  overflow-x:hidden;
}

/* PARTICLE BACKGROUND */
canvas{
  position:fixed;
  top:0;
  left:0;
  z-index:-1;
}

nav{
  position:fixed;
  width:100%;
  top:0;
  padding:16px 24px;
  background:rgba(15,20,36,0.6);
  backdrop-filter:blur(12px);
  z-index:100;
}

.container{
  max-width:1100px;
  margin:auto;
  padding:100px 20px 40px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
  gap:18px;
}

.card{
  padding:22px;
  border-radius:16px;
  border:1px solid var(--border);
  background:linear-gradient(145deg,#0f1424,#0b1020);
  position:relative;
  cursor:pointer;
  transform-style:preserve-3d;
  transition:0.4s;
}

.card:hover{
  transform:rotateX(6deg) rotateY(-6deg) scale(1.05);
  box-shadow:0 30px 80px rgba(0,0,0,0.6);
}

.card::after{
  content:"";
  position:absolute;
  inset:0;
  border-radius:16px;
  background:linear-gradient(120deg, transparent, rgba(79,142,247,0.25), transparent);
  opacity:0;
  transition:0.4s;
}

.card:hover::after{opacity:1}

/* PAGE TRANSITION */
.page{
  opacity:0;
  transform:translateY(40px) scale(0.98);
  transition:0.6s cubic-bezier(.2,.8,.2,1);
}
.page.active{
  opacity:1;
  transform:translateY(0) scale(1);
}

/* TEXT ANIMATION */
.art-h1{
  font-size:38px;
  font-weight:800;
  margin-bottom:10px;
  animation:fadeUp 0.7s ease;
}

.art-intro{color:var(--text2);margin-bottom:20px}

.art-alert{
  padding:16px;
  border-radius:12px;
  margin:20px 0;
  background:rgba(79,142,247,0.12);
  animation:fadeUp 0.8s ease;
}

@keyframes fadeUp{
  from{opacity:0;transform:translateY(30px)}
  to{opacity:1;transform:translateY(0)}
}

.back{
  margin-bottom:20px;
  display:inline-block;
  color:var(--blue);
  cursor:pointer;
  transition:0.25s;
}

.back:hover{
  transform:translateX(-8px);
}

</style>
</head>
<body>

<canvas id="bg"></canvas>
<nav>ApexVisa ✦ Elite</nav>

<div id="home" class="container page active">
  <div class="grid" id="grid"></div>
</div>

<div id="article" class="container page">
  <div class="back" onclick="goHome()">← Back</div>
  <div id="content"></div>
</div>

<script>

/* PARTICLES */
const canvas = document.getElementById('bg');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = Array.from({length:60},()=>({
  x:Math.random()*canvas.width,
  y:Math.random()*canvas.height,
  r:Math.random()*2,
  dx:(Math.random()-0.5)*0.5,
  dy:(Math.random()-0.5)*0.5
}));

function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  particles.forEach(p=>{
    p.x+=p.dx;
    p.y+=p.dy;
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle='rgba(79,142,247,0.6)';
    ctx.fill();
  });
  requestAnimationFrame(animate);
}
animate();

/* CONTENT */
const ARTICLES={
"rules":{title:"Immigration Rules",intro:"UK visa framework.",content:"Legal requirements and structure."},
"refusal":{title:"Visa Refusal",intro:"Why applications fail.",content:"Funds, credibility, documentation."}
};

function load(){
  const grid=document.getElementById('grid');
  Object.entries(ARTICLES).forEach(([id,a])=>{
    grid.innerHTML+=`<div class="card" onclick="openPage('${id}')">
      <strong>${a.title}</strong><br>
      <span style='color:#9aa3b8'>${a.intro}</span>
    </div>`;
  });
}

function openPage(id){
  const a=ARTICLES[id];

  document.getElementById('content').innerHTML=`
    <div class='art-h1'>${a.title}</div>
    <div class='art-intro'>${a.intro}</div>
    <div class='art-alert'>${a.content}</div>
  `;

  switchPage('article');
}

function goHome(){switchPage('home');}

function switchPage(target){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  setTimeout(()=>{
    document.getElementById(target).classList.add('active');
  },80);
}

load();

</script>

</body>
</html>
